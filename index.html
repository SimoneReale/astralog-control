<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraLog-HPC | Mission Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: #161b22;
            --card-border: #30363d;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --danger: #f85149;
            --warning: #d29922;
            --terminal: #000000;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-dim);
            margin-top: 10px;
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 24px;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .card:hover {
            border-color: var(--accent);
        }

        .sat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .sat-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
        }

        .cluster-box {
            background: var(--terminal);
            border-radius: 6px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid #000;
        }

        .cluster-str {
            font-family: 'Cascadia Code', 'Source Code Pro', monospace;
            font-size: 0.75rem;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        .status-text {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex-grow: 1;
        }

        .btn {
            font-family: inherit;
            font-weight: 600;
            font-size: 0.8rem;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid var(--card-border);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
        }

        .btn-copy {
            padding: 4px 8px;
            font-size: 0.7rem;
            background: #21262d;
            color: var(--text-main);
        }

        .btn-copy:hover { background: #30363d; color: #fff; }

        .btn-check {
            background: transparent;
            color: var(--accent);
            border-color: var(--accent);
        }

        .btn-check:hover:not(:disabled) {
            background: rgba(88, 166, 255, 0.1);
        }

        .btn-check:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-download {
            background: #21262d;
            color: var(--text-main);
            flex: 1;
        }

        .btn-download:hover {
            background: #30363d;
            border-color: var(--text-dim);
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .state-online { color: var(--success); }
        .state-online .status-indicator { background: var(--success); box-shadow: 0 0 10px var(--success); }
        
        .state-offline { color: var(--danger); }
        .state-offline .status-indicator { background: var(--danger); }

        .state-checking { color: var(--warning); }
        .state-checking .status-indicator { background: var(--warning); animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        footer {
            margin-top: 60px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🛰️ AstraLog Fleet Mission Control</h1>
        <p class="subtitle">Real-time Telemetry Health Check & Configuration Center</p>
    </header>

    <div class="grid" id="fleet-grid"></div>

    <footer>
        High Performance Computing Course | A.Y. 2025-2026
    </footer>
</div>

<script>
    const FLEET = [
        { id: "SAT_ALPHA", broker: "fb2fb70e5df845aaa8ac44ead8e3c5e1.s1.eu.hivemq.cloud", topic: "esa/astralog/telemetry", folder: "alpha_mission" },
        //{ id: "SAT_BETA",  broker: "another_cluster_id.s1.eu.hivemq.cloud", topic: "esa/astralog/telemetry", folder: "beta_mission" }
    ];

    const USER = "students";
    const PASS = "Listeningstuff26";

    const grid = document.getElementById('fleet-grid');

    FLEET.forEach(sat => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="sat-header">
                <div class="sat-name">${sat.id}</div>
                <button class="btn btn-check" id="btn-${sat.id}" onclick="checkStatus('${sat.id}')">
                    CHECK STREAM
                </button>
            </div>

            <div class="cluster-box">
                <div class="cluster-str" id="str-${sat.id}">${sat.broker}</div>
                <button class="btn btn-copy" onclick="copyText('${sat.broker}', this)">COPY</button>
            </div>

            <div class="status-row" id="row-${sat.id}">
                <div class="status-indicator"></div>
                <div class="status-text" id="label-${sat.id}">Status: Ready</div>
            </div>

            <div class="actions">
                <a href="config/${sat.folder}/rules.json" download class="btn btn-download">📄 Rules</a>
                <a href="config/${sat.folder}/sensors.yaml" download class="btn btn-download">⚙️ Sensors</a>
            </div>
        `;
        grid.appendChild(card);
    });

    function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "COPIED!";
            btn.style.color = "var(--success)";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.color = "var(--text-main)";
            }, 2000);
        });
    }

    function checkStatus(satId) {
        const sat = FLEET.find(s => s.id === satId);
        const label = document.getElementById(`label-${satId}`);
        const row = document.getElementById(`row-${satId}`);
        const btn = document.getElementById(`btn-${satId}`);

    
        btn.disabled = true;
        row.className = "status-row state-checking";
        label.innerText = "Connecting...";

        let timeoutHandle;
        const clientId = "web_check_" + Math.random().toString(16).substr(2, 4);
        const client = new Paho.MQTT.Client(`wss://${sat.broker}:8884/mqtt`, clientId);

        // Fail safety: if no message in 7 seconds
        timeoutHandle = setTimeout(() => {
            row.className = "status-row state-offline";
            label.innerText = "Status: Offline (No Data)";
            btn.disabled = false;
            if(client.isConnected()) client.disconnect();
        }, 7000);

        client.onMessageArrived = (msg) => {
            clearTimeout(timeoutHandle);
            row.className = "status-row state-online";
            label.innerText = "Status: Online";
            btn.disabled = false;
            client.disconnect();
            console.log(`Probe successful for ${satId}`);
        };

        const options = {
            useSSL: true,
            userName: USER,
            password: PASS,
            onSuccess: () => {
                label.innerText = "Listening...";
                client.subscribe(sat.topic);
            },
            onFailure: (e) => {
                clearTimeout(timeoutHandle);
                row.className = "status-row state-offline";
                label.innerText = "Status: Unreachable";
                btn.disabled = false;
            }
        };

        client.connect(options);
    }
</script>

</body>
</html>
