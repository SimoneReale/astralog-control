<!DOCTYPE html>
<html>
<head>
    <title>ESA AstraLog Fleet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 20px; border: 1px solid #333; position: relative; }
        .cluster-info { font-family: monospace; font-size: 0.75em; color: #00aaff; display: block; margin-bottom: 10px; }
        .status { float: right; padding: 4px 8px; border-radius: 4px; font-size: 0.7em; font-weight: bold; }
        .active { background: #1b4d3e; color: #2ecc71; }
        .offline { background: #4d1b1b; color: #e74c3c; }
        .data-stream { background: #000; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.85em; color: #888; margin: 15px 0; min-height: 40px; }
        .btn { background: #333; color: white; border: 1px solid #444; padding: 8px 12px; border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 0.9em; margin-right: 5px; }
        .btn:hover { background: #444; }
    </style>
</head>
<body>
    <h1>🛰️ Mission Control Center</h1>
    <div class="grid" id="fleet-grid"></div>

    <script>
        // --- CONFIGURAZIONE FLOTTA ---
        // In un caso reale potresti fare il fetch del file yaml/json
        const FLEET = [
            { id: "SAT_ALPHA", broker: "fb2fb70e5df845aaa8ac44ead8e3c5e1.s1.eu.hivemq.cloud", topic: "esa/astralog/telemetry", folder: "alpha_mission" },
            { id: "SAT_BETA", broker: "another_id.s1.eu.hivemq.cloud", topic: "esa/astralog/telemetry", folder: "beta_mission" }
        ];

        const lastSeen = {};

        function createCard(sat) {
            const html = `
                <div class="card" id="card-${sat.id}">
                    <span id="status-${sat.id}" class="status offline">OFFLINE</span>
                    <small class="cluster-info">CLUSTER: ${sat.broker}</small>
                    <b style="font-size: 1.4em;">${sat.id}</b>
                    <div class="data-stream" id="stream-${sat.id}">Waiting for telemetry...</div>
                    <div style="margin-top: 15px;">
                        <a href="config/${sat.folder}/rules.json" download class="btn">Rules.json</a>
                        <a href="config/${sat.folder}/sensors.yaml" download class="btn">Sensors.yaml</a>
                    </div>
                </div>`;
            document.getElementById('fleet-grid').innerHTML += html;
        }

        function initMQTT(sat) {
            const client = new Paho.MQTT.Client(`wss://${sat.broker}:8884/mqtt`, `web_${sat.id}_${Math.random()}`);
            
            client.onMessageArrived = (msg) => {
                lastSeen[sat.id] = Date.now();
                const data = JSON.parse(msg.payloadString);
                document.getElementById(`stream-${sat.id}`).innerHTML = `
                    <span style="color: #2ecc71">●</span> [${data.sensor_id}] ${data.value}<br>
                    <span style="font-size: 0.8em">${data.timestamp}</span>`;
                
                const badge = document.getElementById(`status-${sat.id}`);
                badge.innerText = "ACTIVE";
                badge.className = "status active";
            };

            client.connect({
                useSSL: true, userName: "student_user", password: "student_password",
                onSuccess: () => { client.subscribe(sat.topic); },
                onFailure: () => { console.log(`Failed to connect ${sat.id}`); }
            });
        }

        // Avvio
        FLEET.forEach(sat => {
            createCard(sat);
            initMQTT(sat);
        });

        // Watchdog (30 secondi per essere molto tollerante ai lag del browser)
        setInterval(() => {
            const now = Date.now();
            FLEET.forEach(sat => {
                if (!lastSeen[sat.id] || (now - lastSeen[sat.id] > 30000)) {
                    const badge = document.getElementById(`status-${sat.id}`);
                    badge.innerText = "OFFLINE";
                    badge.className = "status offline";
                }
            });
        }, 10000);
    </script>
</body>
</html>
