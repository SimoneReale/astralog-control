<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraLog-HPC | Mission Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: #161b22;
            --card-border: #30363d;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --danger: #f85149;
            --warning: #d29922;
            --terminal: #000;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0; padding: 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 2.2rem; margin: 0; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- DEADLINE BAR --- */
        .deadline-container { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 15px; margin-bottom: 25px; }
        .progress-bg { background: #21262d; border-radius: 10px; height: 12px; overflow: hidden; border: 1px solid var(--card-border); margin: 8px 0; }
        #progress-fill { background: linear-gradient(90deg, var(--accent), var(--success)); height: 100%; width: 0%; transition: width 1s; }

        /* --- GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 20px; transition: 0.2s; }
        
        .sat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .sat-name { font-size: 1.3rem; font-weight: 700; color: #fff; }

        .chart-container { background: var(--terminal); border-radius: 8px; padding: 10px; margin-bottom: 15px; height: 180px; border: 1px solid #222; }
        
        .cluster-box { background: var(--terminal); border-radius: 6px; padding: 8px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; border: 1px solid #222; }
        .cluster-str { font-family: monospace; font-size: 0.7rem; color: var(--accent); overflow: hidden; text-overflow: ellipsis; }

        /* --- STATUS LABELS --- */
        .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 6px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); }
        .online { color: var(--success); }
        .online .dot { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .offline { color: var(--danger); }
        .offline .dot { background: var(--danger); }
        .checking { color: var(--warning); }
        .checking .dot { background: var(--warning); animation: pulse 1s infinite; }

        /* --- BUTTONS --- */
        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn { font-size: 0.7rem; font-weight: bold; padding: 8px 12px; border-radius: 6px; cursor: pointer; border: 1px solid var(--card-border); transition: 0.2s; background: #21262d; color: #fff; text-transform: uppercase; }
        .btn:hover { background: #30363d; border-color: var(--text-dim); }
        
        .btn-check { color: var(--accent); border-color: var(--accent); background: transparent; }
        .btn-monitor { background: var(--accent); color: #000; border: none; }
        .btn-stop { background: var(--danger); color: #fff; border: none; }
        .btn-copy { font-size: 0.6rem; padding: 4px 8px; }

        .actions { display: flex; gap: 8px; border-top: 1px solid var(--card-border); padding-top: 15px; }
        .btn-dl { flex: 1; text-align: center; text-decoration: none; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🛰️ AstraLog Mission Control</h1>
        <p style="color: var(--text-dim); font-size: 0.9rem;">HPC Ground Segment Monitoring Portal</p>
    </header>

    <div class="deadline-container">
        <div style="display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: bold;">
            <span>MISSION TIMELINE</span>
            <span id="deadline-timer">Calculating window...</span>
        </div>
        <div class="progress-bg"><div id="progress-fill"></div></div>
    </div>

    <div class="grid" id="fleet-grid"></div>

    <footer style="margin-top: 40px; text-align: center; font-size: 0.7rem; color: var(--text-dim);">
        Politecnico di Milano | Software Engineering for HPC 2025-2026
    </footer>
</div>

<script>
    const FLEET =[
        { id: "SAT_ALPHA", broker: "fb2fb70e5df845aaa8ac44ead8e3c5e1.s1.eu.hivemq.cloud", topic: "esa/astralog/telemetry", folder: "alpha_mission" },
        { id: "SAT_BETA",  broker: "03631557be364439a74d8fe1331c24e8.s1.eu.hivemq.cloud", topic: "esa/astralog/telemetry", folder: "beta_mission" }
    ];

    const AUTH = { user: "students", pass: "Listeningstuff26" };
    const charts = {};
    const monitorClients = {};

    // --- RENDER CARDS ---
    const grid = document.getElementById('fleet-grid');
    FLEET.forEach(sat => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="sat-header">
                <div class="sat-name">${sat.id}</div>
                <div class="btn-group">
                    <button class="btn btn-check" onclick="checkAvailability('${sat.id}')">Check Availability</button>
                    <button class="btn btn-monitor" id="mon-btn-${sat.id}" onclick="toggleMonitor('${sat.id}')">Live Monitor</button>
                </div>
            </div>
            
            <div class="chart-container">
                <canvas id="chart-${sat.id}"></canvas>
            </div>

            <div class="cluster-box">
                <div class="cluster-str">${sat.broker}</div>
                <button class="btn btn-copy" onclick="copyText('${sat.broker}', this)">Copy</button>
            </div>

            <div class="status-row" id="row-${sat.id}">
                <div class="dot"></div>
                <span id="label-${sat.id}">Status: Ready</span>
            </div>

            <div class="actions">
                <a href="config/${sat.folder}/rules.json" download class="btn btn-dl">Rules.json</a>
                <a href="config/${sat.folder}/sensors.yaml" download class="btn btn-dl">Sensors.yaml</a>
            </div>
        `;
        grid.appendChild(card);
        initChart(sat.id);
    });

    // --- LOGICA CHART ---
    function initChart(satId) {
        const ctx = document.getElementById(`chart-${satId}`).getContext('2d');
        charts[satId] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(25).fill(''),
                datasets: [{
                    data: Array(25).fill(null),
                    borderColor: '#58a6ff',
                    backgroundColor: 'rgba(88, 166, 255, 0.1)',
                    fill: true,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { grid: { color: '#222' }, ticks: { color: '#555' } }
                }
            }
        });
    }

    // --- CHECK AVAILABILITY (Sonda veloce) ---
    function checkAvailability(satId) {
        const sat = FLEET.find(s => s.id === satId);
        const label = document.getElementById(`label-${satId}`);
        const row = document.getElementById(`row-${satId}`);
        
        row.className = "status-row checking";
        label.innerText = "Probing stream...";

        const client = new Paho.MQTT.Client(`wss://${sat.broker}:8884/mqtt`, "probe_" + satId + Math.random().toString(16).substr(2, 4));
        
        let timeout = setTimeout(() => {
            row.className = "status-row offline";
            label.innerText = "Offline (No data)";
            if(client.isConnected()) client.disconnect();
        }, 5000);

        client.onMessageArrived = (msg) => {
            clearTimeout(timeout);
            row.className = "status-row online";
            label.innerText = "Online (Data detected)";
            client.disconnect();
        };

        client.connect({
            useSSL: true, userName: AUTH.user, password: AUTH.pass,
            onSuccess: () => client.subscribe(sat.topic),
            onFailure: () => { clearTimeout(timeout); row.className = "status-row offline"; label.innerText = "Unreachable"; }
        });
    }

    // --- MONITORING (Grafico persistente) ---
    function toggleMonitor(satId) {
        const btn = document.getElementById(`mon-btn-${satId}`);
        if (monitorClients[satId]) {
            // STOP
            monitorClients[satId].disconnect();
            delete monitorClients[satId];
            btn.innerText = "Live Monitor";
            btn.className = "btn btn-monitor";
        } else {
            // START
            startMonitor(satId);
            btn.innerText = "Stop Monitor";
            btn.className = "btn btn-stop";
        }
    }

    function startMonitor(satId) {
        const sat = FLEET.find(s => s.id === satId);
        const client = new Paho.MQTT.Client(`wss://${sat.broker}:8884/mqtt`, "mon_" + satId + Math.random().toString(16).substr(2, 4));
        monitorClients[satId] = client;

        client.onMessageArrived = (msg) => {
            const data = JSON.parse(msg.payloadString);
            const chart = charts[satId];
            chart.data.datasets[0].data.shift();
            chart.data.datasets[0].data.push(data.value);
            chart.update('none');
        };

        client.connect({
            useSSL: true, userName: AUTH.user, password: AUTH.pass,
            onSuccess: () => client.subscribe(sat.topic),
            onFailure: () => toggleMonitor(satId)
        });
    }

    // --- UTILS ---
    function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const old = btn.innerText;
            btn.innerText = "COPIED!";
            setTimeout(() => btn.innerText = old, 2000);
        });
    }

    function updateDeadline() {
        const start = new Date("2026-04-10").getTime();
        const end = new Date("2026-06-14").getTime();
        const now = new Date().getTime();
        const progress = Math.max(0, Math.min(100, ((now - start) / (end - start)) * 100));
        document.getElementById("progress-fill").style.width = progress + "%";
        const diff = end - now;
        if (diff > 0) {
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("deadline-timer").innerText = days + " DAYS UNTIL CLOSING";
        } else {
            document.getElementById("deadline-timer").innerText = "MISSION CLOSED";
        }
    }

    updateDeadline();
</script>

</body>
</html>
