<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraLog-HPC | Mission Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #eee; text-align: center; padding: 50px; }
        .container { max-width: 600px; margin: 0 auto; background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #00aaff; margin-bottom: 10px; }
        .status-box { padding: 15px; margin: 20px 0; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .status-up { background: #1b4d3e; color: #2ecc71; border: 1px solid #2ecc71; }
        .status-down { background: #4d1b1b; color: #e74c3c; border: 1px solid #e74c3c; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .btn { padding: 12px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.2s; cursor: pointer; border: none; }
        .btn-download { background: #00aaff; color: white; }
        .btn-download:hover { background: #0088cc; }
        #log { font-family: monospace; font-size: 0.8em; margin-top: 20px; color: #888; height: 50px; overflow: hidden; }
    </style>
</head>
<body>

<div class="container">
    <h1>AstraLog-HPC</h1>
    <p>Mission Telemetry Status Monitoring</p>

    <!-- Indicatore di stato -->
    <div id="statusBadge" class="status-box status-down">
        STREAM STATUS: OFFLINE
    </div>

    <div id="log">In attesa di dati...</div>

    <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">

    <p>Scarica le configurazioni di missione:</p>
    <div class="btn-group">
        <!-- Assicurati che i nomi dei file corrispondano a quelli nel repo -->
        <a href="rules.json" download class="btn btn-download">📄 rules.json</a>
        <a href="sensors.yaml" download class="btn btn-download">⚙️ sensors.yaml</a>
    </div>
</div>

<script>
    // --- CONFIGURAZIONE ---
    const BROKER = "fb2fb70e5df845aaa8ac44ead8e3c5e1.s1.eu.hivemq.cloud";
    const PORT = 8884; // Porta WebSocket per HiveMQ Cloud
    const TOPIC = "esa/astralog/telemetry";
    const USER = "students";
    const PASS = "Listeningstuff26";

    let lastMessageTime = 0;
    const statusBadge = document.getElementById('statusBadge');
    const logDiv = document.getElementById('log');

    const clientId = "web_monitor_" + Math.random().toString(16).substr(2, 8);
    const client = new Paho.MQTT.Client("wss://" + BROKER + ":" + PORT + "/mqtt", clientId);

    const options = {
        useSSL: true,
        userName: USER,
        password: PASS,
        onSuccess: onConnect,
        onFailure: () => { 
            console.log("Connessione Fallita");
            updateStatus(false);
        }
    };

    client.connect(options);

    function onConnect() {
        console.log("Connesso a HiveMQ");
        client.subscribe(TOPIC);
    }

    client.onMessageArrived = function(message) {
        lastMessageTime = Date.now();
        updateStatus(true);
        
        const data = JSON.parse(message.payloadString);
        logDiv.innerText = `Ultimo pacchetto: ${data.sensor_id} -> ${data.value} @ ${data.timestamp}`;
    };

    function updateStatus(isUp) {
        if(isUp) {
            statusBadge.innerText = "STREAM STATUS: ACTIVE 🛰️";
            statusBadge.className = "status-box status-up";
        } else {
            statusBadge.innerText = "STREAM STATUS: INACTIVE 🌑";
            statusBadge.className = "status-box status-down";
        }
    }

    // Watchdog: se non riceve messaggi per più di 5 secondi, mette lo stato in Down
    setInterval(() => {
        if (Date.now() - lastMessageTime > 5000) {
            updateStatus(false);
        }
    }, 2000);

</script>

</body>
</html>
